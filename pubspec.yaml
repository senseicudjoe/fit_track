name: fit_track
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.0.0
  pedometer: ^4.0.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.1
  flutter_launcher_icons: ^0.13.1
  go_router: ^14.2.0
  uuid: ^4.4.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# This section controls the launcher icon and the Android 12+ splash icon
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  # For Android 8.0+: use a color background to match your app theme
  adaptive_icon_background: "#6366f1" # This should match AppColors.primary
  adaptive_icon_foreground: "assets/images/icon.png"
